<!doctype html>
<html lang="en">

<head>
  <title>Home page</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <!-- header -->
  <header>
    <nav class="navbar">
      <div class="logo">
        <img src="./images/logo.png" alt="Logo" class="logo-img" />
        <a href="./index.html">MegaStore</a>
      </div>

      <ul class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Wishlist</a></li>
        <li><a href="./pages/about.html">About</li>
        <li><a href="#">Cart</a></li>
        <li><a href="#">Login</a></li>
      </ul>

      <div class="menu-btn" onclick="toggleMenu()">
        <img src="./images/menu.png" alt="menu" />
      </div>
  </header>

  <!-- img slider -->
  <section class="slider">
    <div class="slide active">
      <img src="./images/laptop.jpg" ` />
    </div>

    <div class="slide">
      <img src="./images/cloths.jpg" />
    </div>

    <div class="slide">
      <img src="./images/shop.jpg" />
    </div>

    <div class="slide">
      <img src="./images/book.jpg" />
    </div>

    <div class="slide">
      <img src="./images/headphone.jpg" />
    </div>

    <div class="slide">
      <img src="./images/shoes.jpg" />
    </div>

    <div class="slide">
      <img src="./images/watch.jpg" />
    </div>

    <!-- Constant Content -->
    <div class="slide-content">
      <h1>Upgrade Your Tech, Upgrade Your Life</h1>
      <p>Get exclusive deals on premium gadgets and electronics.</p>
      <button onclick="openProducts()">Shop New Arrivals</button>
    </div>

    <button class="prev" onclick="prevSlide()">&#10094;</button>
    <button class="next" onclick="nextSlide()">&#10095;</button>
  </section>

  <!-- categories section -->
  <section class="categories">
    <h2 class="section-title">Shop By Category</h2>

    <div class="category-container">

      <div class="category-card">
        <img src="./images/electronics.png" class="category-icon" onclick="openProducts()" />
        <h3>Electronics</h3>
      </div>

      <div class="category-card">
        <img src="./images/headphone.png" class="category-icon" onclick="openProducts()" />
        <h3>Headphones</h3>
      </div>

      <div class="category-card">
        <img src="./images/watch.png" class="category-icon" onclick="openProducts()" />
        <h3>Watches</h3>
      </div>

      <div class="category-card">
        <img src="./images/fashion.png" class="category-icon" onclick="openProducts()" />
        <h3>Fashion</h3>
      </div>

      <div class="category-card">
        <img src="./images/clothing.png" class="category-icon" onclick="openProducts()" />
        <h3>Clothing</h3>
      </div>

    </div>
  </section>

  <!-- featured products -->
    <section class="featured-products">
      <h2 class="section-title">Featured Products</h2>
    </section>

  <script src="./js/app.js"></script>
</body>

</html>
